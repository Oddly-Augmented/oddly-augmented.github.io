name: Generate Gallery Data

on:
  push:
    paths:
      - 'images/**'
      - '_data/gallery-config.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate images.yml
        run: |
          python3 << 'EOF'
          import os, yaml

          config_path = "_data/gallery-config.yml"
          config = {}
          if os.path.exists(config_path):
              with open(config_path) as f:
                  config = yaml.safe_load(f) or {}

          blacklist = config.get("blacklist", [])
          alt_map   = config.get("alt", {})

          entries = []
          for filename in sorted(os.listdir("images")):
              if filename in blacklist:
                  continue
              name = os.path.splitext(filename)[0]
              alt  = alt_map.get(filename, name)
              entries.append({"src": f"/images/{filename}", "alt": alt})

          with open("_data/images.yml", "w") as f:
              f.write("# Auto-generated — do not edit manually\n")
              yaml.dump(entries, f, allow_unicode=True, default_flow_style=False)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/images.yml
          git diff --staged --quiet || git commit -m "Auto-update gallery images"
          git push
